    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; background: #f6f7fb; color: #172033; }
    .wrap { max-width: 920px; margin: 0 auto; padding: 28px 18px 60px; }
    .hero { background: linear-gradient(135deg, #1e3a8a, #0f766e); color: white; padding: 28px; border-radius: 24px; box-shadow: 0 14px 32px rgba(15, 23, 42, .18); }
    h1 { margin: 0 0 8px; font-size: 34px; }
    .hero p { margin: 6px 0; line-height: 1.7; }
    .section { margin-top: 22px; background: white; border-radius: 20px; padding: 22px; box-shadow: 0 8px 24px rgba(15, 23, 42, .08); }
    h2 { margin-top: 0; }
    a { color: #1455d9; text-decoration: none; font-weight: 650; }
    a:hover { text-decoration: underline; }
    .muted { color: rgba(255,255,255,.82); font-size: 14px; }
    .hint { color: #667085; line-height: 1.7; margin-top: 0; }
    .course-list { display: grid; gap: 14px; }
    .course-card { border: 1px solid #edf0f7; border-radius: 18px; padding: 16px; display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: center; background: #fff; }
    .course-card.doing { border-color: #f59e0b; background: #fffbeb; }
    .course-card.done { border-color: #22c55e; background: #f0fdf4; }
    .course-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    .course-links { color: #667085; line-height: 1.8; }
    .course-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    button { border: 1px solid #d7dce8; background: white; border-radius: 999px; padding: 9px 12px; font-size: 15px; cursor: pointer; color: #344054; }
    button.active { color: white; border-color: transparent; }
    button[data-status="todo"].active { background: #64748b; }
    button[data-status="doing"].active { background: #f59e0b; }
    button[data-status="done"].active { background: #16a34a; }
    @media (max-width: 640px) { .course-card { grid-template-columns: 1fr; } .course-actions { justify-content: flex-start; } h1 { font-size: 28px; } }
  </style>
</head>

  </main>
  <script>
    const STORAGE_KEY = 'english-business-trip-learning-status-v1';
    const state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    function paint(card, status) {
      card.classList.remove('todo', 'doing', 'done');
      card.classList.add(status || 'todo');
      card.querySelectorAll('button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.status === (status || 'todo'));
      });
    }
    document.querySelectorAll('.course-card').forEach(card => {
      const key = card.dataset.key;
      paint(card, state[key] || 'todo');
      card.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          state[key] = btn.dataset.status;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
          paint(card, state[key]);
        });
      });
    });
  </script>
