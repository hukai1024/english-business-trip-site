<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}}</title>
  <style>
    @page { size: A4; margin: 14mm; }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.45;
      color: #111827;
      background: #ffffff;
      font-size: 13px;
    }
    h1 { font-size: 25px; margin: 0 0 8px; }
    h2 { font-size: 18px; margin: 18px 0 8px; padding-bottom: 4px; border-bottom: 2px solid #e5e7eb; }
    h3 { font-size: 15px; margin: 12px 0 6px; }
    p { margin: 5px 0; }
    .meta { color: #4b5563; font-size: 12px; margin-bottom: 10px; }
    .badges { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0 12px; }
    .badge { background: #eef2ff; color: #3730a3; padding: 3px 8px; border-radius: 999px; font-size: 12px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 10px; background: #f9fafb; break-inside: avoid; }
    .phrase { margin: 7px 0; padding: 7px 8px; background: #fff; border-left: 4px solid #2563eb; border-radius: 6px; }
    .en { font-weight: 700; color: #111827; }
    .zh { color: #374151; margin-top: 2px; }
    .pron { color: #7c2d12; background: #fffbeb; padding: 2px 5px; border-radius: 4px; display: inline-block; margin-top: 3px; }
    table { width: 100%; border-collapse: collapse; margin: 8px 0; break-inside: avoid; }
    th, td { border: 1px solid #d1d5db; padding: 6px; vertical-align: top; }
    th { background: #f3f4f6; }
    .note { background: #ecfeff; border: 1px solid #a5f3fc; padding: 8px; border-radius: 8px; }
    .todo { background: #fef3c7; border: 1px solid #fcd34d; padding: 8px; border-radius: 8px; }
    .footer { margin-top: 18px; color: #6b7280; font-size: 11px; }
    @media print {
      body { font-size: 12px; }
      h1 { font-size: 22px; }
      h2 { font-size: 16px; }
      .card { background: #fff; }
    }
  </style>
</head>
<body>
{{BODY}}
</body>
</html>
